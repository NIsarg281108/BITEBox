<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITE The Box</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="x-icon" href="images/favicon_io/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Nova+Flat&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
    <script src="script.js"></script>
<body>
 <header>
  <nav>
    <img src="images/logo2.png" alt="logo" >
    <ul>
      <li><a href="Home.html" class="active"><i class="fa-regular fa-house"></i></a></li>
      <li><a href="Menu.html">Menu</a></li>
      <li><a href="BiteDeals.html">BiteDeals</a></li>
      <li><a href="Cart.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
      <li><a href="Login.html"><i class="fa-solid fa-right-to-bracket"></i> Login</a></li>
    </ul>
  </nav>
 </header>
 <section class="auth-container">
    <div class="auth-box">
        <h2>Login To BiteBox</h2><br>
        <form>
            <input id="email" type="text" name="username" placeholder="Username" required>
            <div style="position: relative;">
              <input id="password" type="password" name="password" placeholder="Password" required>
              <i class="fa-solid fa-eye" onclick="togglepassword()" style="position: absolute; right:50px; top: 20px;"></i>
            </div>
            <button type="button" onclick="login()">Login</button><br><br>
            <p style="margin-bottom: 5px;"><a href="register.html">Forgot Password</a></p>
            <p id="error" style="color: crimson"></p>
            <p>Don't have an account<a href="register.html"> Signup</a></p>
        </form>
    </div>    
 </section>
 </body>
 </html>
